<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Utenfor arbeidstid</title>
<style>
  :root {
    --blue:    #1020F9;
    --navy:    #000B2E;
    --text:    #293351;
    --muted:   #4F5A7D;
    --bg-blue: #EBF3FF;
    --bg-grey: #F2F3F7;
    --red:     #E53935;
    --divider: #E4E7EF;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    background: #E5E5E5;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
  }
  .phone {
    width: 375px; height: 812px;
    background: #fff;
    border-radius: 44px; overflow: hidden; position: relative;
    box-shadow: 0 30px 80px rgba(0,0,0,.35);
    display: flex; flex-direction: column;
  }
  .notch {
    position: absolute; top: 0; left: 50%; transform: translateX(-50%);
    width: 150px; height: 30px; background: #000;
    border-radius: 0 0 20px 20px; z-index: 50;
  }
  .status-bar {
    flex-shrink: 0; height: 44px; background: #fff;
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 20px 0;
  }
  .status-bar .time { font-size: 15px; font-weight: 700; color: var(--navy); }
  .status-icons { display: flex; gap: 6px; align-items: center; }
  .nav-bar {
    flex-shrink: 0; background: #fff; height: 52px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 16px; border-bottom: 1px solid var(--divider);
  }
  .nav-action {
    font-size: 14px; font-weight: 500; color: var(--blue);
    cursor: pointer; padding: 4px 0; min-width: 52px;
  }
  .nav-action.right { text-align: right; }
  .nav-action:active { opacity: .6; }
  .nav-title { font-size: 16px; font-weight: 500; color: var(--text); text-align: center; flex: 1; padding: 0 8px; }
  .content {
    flex: 1; overflow-y: auto; padding: 24px 16px;
    -webkit-overflow-scrolling: touch;
    display: flex; flex-direction: column; gap: 24px;
  }
  .content::-webkit-scrollbar { display: none; }
  .section { display: flex; flex-direction: column; gap: 6px; }
  .section-label { font-size: 14px; font-weight: 500; color: var(--muted); }
  .section-desc { font-size: 14px; font-weight: 300; color: var(--muted); line-height: 1.4; }
  .card { background: var(--bg-grey); border-radius: 8px; overflow: hidden; }
  .row {
    display: flex; align-items: center; padding: 8px 16px; min-height: 56px;
    position: relative; cursor: pointer; user-select: none;
  }
  .row:not(:last-child)::after {
    content: ''; position: absolute; bottom: 0; left: 0; right: 0;
    height: 1px; background: var(--divider);
  }
  .row:active { opacity: .7; }
  .row-body { flex: 1; min-width: 0; }
  .row-label { font-size: 14px; font-weight: 300; color: var(--text); }
  .row-sub { font-size: 12px; font-weight: 300; color: var(--muted); margin-top: 2px; }
  #queueCard .row-label strong { font-weight: 400; }
  .row-link { font-size: 14px; color: var(--blue); font-weight: 300; margin-left: 8px; flex-shrink: 0; }
  .row-chevron { margin-left: 6px; flex-shrink: 0; }

  /* Tab bar */
  .tab-bar { flex-shrink: 0; background: #fff; border-top: 1px solid rgba(79,90,125,.1); padding-top: 4px; }
  .tabs { display: flex; }
  .tab { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 6px 4px 2px; cursor: pointer; background: none; border: none; outline: none; -webkit-tap-highlight-color: transparent; }
  .tab-icon-wrap { position: relative; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; color: var(--muted); }
  .tab.active .tab-icon-wrap { color: var(--blue); }
  .tab-lbl { font-size: 10px; font-weight: 400; color: var(--muted); letter-spacing: .1px; }
  .tab.active .tab-lbl { color: var(--blue); font-weight: 600; }
  .badge { position: absolute; top: -3px; right: -5px; min-width: 16px; height: 16px; border-radius: 8px; padding: 0 4px; font-size: 10px; font-weight: 600; color: #fff; display: flex; align-items: center; justify-content: center; line-height: 1; }
  .badge-orange { background: #FF852F; }
  .badge-green  { background: #178222; }
  .home-indicator { height: 28px; display: flex; align-items: center; justify-content: center; }
  .home-bar { width: 134px; height: 5px; border-radius: 3px; background: var(--navy); opacity: .9; }

  /* Sheet */
  .sheet-backdrop { position: absolute; inset: 0; background: rgba(0,11,46,.4); z-index: 100; display: none; align-items: flex-end; }
  .sheet-backdrop.open { display: flex; }
  .sheet { width: 100%; background: #fff; border-radius: 20px 20px 0 0; padding: 4px 16px 24px; display: flex; flex-direction: column; gap: 16px; animation: slideUp .25s ease; }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .sheet-handle { width: 36px; height: 5px; background: #4F5A7D; border-radius: 100px; margin: 8px auto 0; flex-shrink: 0; }
  .sheet-header { display: flex; align-items: center; justify-content: space-between; }
  .sheet-title { font-size: 16px; font-weight: 500; color: var(--navy); }
  .sheet-subtitle { font-size: 14px; color: var(--muted); margin-top: 2px; }
  .sheet-close { width: 32px; height: 32px; border: none; background: none; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--navy); flex-shrink: 0; }
  .num-list { display: flex; flex-direction: column; gap: 8px; }
  #numOptions { display: contents; }
  .num-row { display: flex; align-items: center; gap: 8px; padding: 16px; border-radius: 8px; background: #F2F2F7; cursor: pointer; }
  .num-row.sel { background: #EBF3FF; }
  .num-row-label { flex: 1; font-size: 14px; font-weight: 400; color: var(--navy); }
  .num-radio { width: 22px; height: 22px; border-radius: 50%; border: 2px solid #C7C9D9; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  .num-row.sel .num-radio { border-color: var(--blue); background: var(--blue); }
  .num-row.sel .num-radio::after { content: ''; width: 8px; height: 8px; border-radius: 50%; background: #fff; }
  .toggle { position: relative; width: 48px; height: 28px; flex-shrink: 0; }
  .toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
  .toggle-track { position: absolute; inset: 0; background: #D1D5DB; border-radius: 14px; transition: background .2s; cursor: pointer; }
  .toggle-track::after { content: ''; position: absolute; top: 3px; left: 3px; width: 22px; height: 22px; border-radius: 50%; background: #fff; box-shadow: 0 1px 4px rgba(0,0,0,.25); transition: transform .2s; }
  .toggle input:checked + .toggle-track { background: var(--blue); }
  .toggle input:checked + .toggle-track::after { transform: translateX(20px); }
  .sheet-btn { display: block; width: 100%; padding: 11px 16px; background: var(--blue); border: none; border-radius: 50px; color: #fff; font-size: 16px; font-weight: 500; text-align: center; cursor: pointer; font-family: inherit; }
  .sheet-btn:active { opacity: .85; }
</style>
</head>
<body>
<div class="phone">
  <div class="notch"></div>

  <div class="status-bar">
    <span class="time">9:41</span>
    <div class="status-icons">
      <svg width="17" height="12" viewBox="0 0 17 12" fill="none"><rect x="0" y="7" width="3" height="5" rx="1" fill="#293351"/><rect x="4.5" y="5" width="3" height="7" rx="1" fill="#293351"/><rect x="9" y="2.5" width="3" height="9.5" rx="1" fill="#293351"/><rect x="13.5" y="0" width="3" height="12" rx="1" fill="#293351"/></svg>
      <svg width="16" height="12" viewBox="0 0 16 12" fill="none"><path d="M8 9.5a1.5 1.5 0 100 3 1.5 1.5 0 000-3z" fill="#293351"/><path d="M8 6C5.87 6 3.94 6.84 2.5 8.22l1.42 1.42A5 5 0 018 8a5 5 0 014.08 1.64l1.42-1.42A7 7 0 008 6z" fill="#293351"/><path d="M8 2C4.69 2 1.69 3.31-.07 5.5l1.45 1.45A9 9 0 018 4a9 9 0 016.62 2.95L16.07 5.5C14.31 3.31 11.31 2 8 2z" fill="#293351"/></svg>
      <svg width="25" height="12" viewBox="0 0 25 12" fill="none"><rect x="0.5" y="0.5" width="21" height="11" rx="3.5" stroke="#293351" stroke-opacity=".35"/><rect x="2" y="2" width="16" height="8" rx="2" fill="#293351"/><path d="M23 4v4a2 2 0 000-4z" fill="#293351" fill-opacity=".4"/></svg>
    </div>
  </div>

  <div class="nav-bar">
    <div class="nav-action" onclick="cancel()">Avbryt</div>
    <div class="nav-title">Utenfor arbeidstid</div>
    <div class="nav-action right" onclick="save()">Lagre</div>
  </div>

  <div class="content">

    <div class="section-desc" style="padding-bottom:4px;">Gjelder når ingen arbeidstid er aktiv</div>

    <!-- Visningsnummer -->
    <div class="section">
      <div class="section-label">Visningsnummer</div>
      <div class="card">
        <div class="row" onclick="openNumSheet()">
          <div class="row-body">
            <div class="row-label" id="numLabel">Mitt nummer (999 99 999)</div>
            <div class="row-sub" id="numExternalStatus" style="display:none">Kun for eksterne samtaler</div>
          </div>

          <svg class="row-chevron" width="7" height="13" viewBox="0 0 7 13" fill="none">
            <path d="M1 1 6 6.5 1 12" stroke="#1020F9" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>
    </div>

    <!-- Køstatus -->
    <div class="section">
      <div class="section-label">Køstatus</div>
      <div class="card" id="queueCard"></div>
    </div>

  </div>

  <div class="tab-bar">
    <nav class="tabs" role="tablist">
      <button class="tab" role="tab" onclick="switchTab(this)" aria-label="Logg">
        <div class="tab-icon-wrap">
          <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><circle cx="11" cy="11" r="9" stroke="currentColor" stroke-width="1.7"/><path d="M11 6.5v5l3 2.5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <span class="tab-lbl">Logg</span>
      </button>
      <button class="tab" role="tab" onclick="switchTab(this)" aria-label="Søk">
        <div class="tab-icon-wrap">
          <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><circle cx="10" cy="10" r="6.5" stroke="currentColor" stroke-width="1.7"/><path d="M15 15 20 20" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>
        </div>
        <span class="tab-lbl">Søk</span>
      </button>
      <button class="tab" role="tab" onclick="switchTab(this)" aria-label="Tastatur">
        <div class="tab-icon-wrap">
          <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><circle cx="5" cy="6" r="1.6" fill="currentColor"/><circle cx="11" cy="6" r="1.6" fill="currentColor"/><circle cx="17" cy="6" r="1.6" fill="currentColor"/><circle cx="5" cy="11" r="1.6" fill="currentColor"/><circle cx="11" cy="11" r="1.6" fill="currentColor"/><circle cx="17" cy="11" r="1.6" fill="currentColor"/><circle cx="5" cy="16" r="1.6" fill="currentColor"/><circle cx="11" cy="16" r="1.6" fill="currentColor"/><circle cx="17" cy="16" r="1.6" fill="currentColor"/></svg>
        </div>
        <span class="tab-lbl">Tastatur</span>
      </button>
      <button class="tab active" role="tab" onclick="switchTab(this)" aria-label="Jobbprofil" aria-selected="true">
        <div class="tab-icon-wrap">
          <span class="badge badge-green" id="job-badge" style="display:none"></span>
          <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M11 3a7 7 0 0 0-7 7v.5H5.5a1.5 1.5 0 0 1 1.5 1.5v3A1.5 1.5 0 0 1 5.5 16.5H4.5A1.5 1.5 0 0 1 3 15v-5a8 8 0 0 1 16 0v5a1.5 1.5 0 0 1-1.5 1.5h-1A1.5 1.5 0 0 1 15 15v-3a1.5 1.5 0 0 1 1.5-1.5H18V10a7 7 0 0 0-7-7z" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linejoin="round"/></svg>
        </div>
        <span class="tab-lbl">Jobbprofil</span>
      </button>
      <button class="tab" role="tab" onclick="switchTab(this)" aria-label="Meny">
        <div class="tab-icon-wrap">
          <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M3 6h16M3 11h16M3 16h16" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>
        </div>
        <span class="tab-lbl">Meny</span>
      </button>
    </nav>
    <div class="home-indicator"><div class="home-bar"></div></div>
  </div>

  <!-- ── Visningsnummer sheet ── -->
  <div class="sheet-backdrop" id="numSheetBackdrop" onclick="onNumBackdrop(event)">
    <div class="sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-header">
        <div class="sheet-title">Velg visningsnummer</div>
        <button class="sheet-close" onclick="document.getElementById('numSheetBackdrop').classList.remove('open')">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M1 1l16 16M17 1L1 17" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div class="num-list">
        <div id="numOptions"></div>
        <div id="numExternalRow" style="display:flex;align-items:center;padding:8px 0;">
          <span class="num-row-label">Bruk kun for eksterne samtaler</span>
          <label class="toggle" onclick="event.stopPropagation()">
            <input type="checkbox" id="numExternalCheck"/>
            <div class="toggle-track"></div>
          </label>
        </div>
      </div>
      <button class="sheet-btn" onclick="confirmNum()">Lagre</button>
    </div>
  </div>

  <!-- ── Køstatus sheet ── -->
  <div class="sheet-backdrop" id="queueSheetBackdrop" onclick="onQueueBackdrop(event)">
    <div class="sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-header">
        <div>
          <div class="sheet-title">Velg køstatus</div>
          <div class="sheet-subtitle" id="queueSheetSub"></div>
        </div>
        <button class="sheet-close" onclick="closeQueueSheet()">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M1 1l16 16M17 1L1 17" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div class="num-list">
        <div class="num-row" id="qr0" onclick="selectQueueOpt(0)">
          <div class="num-row-label">
            <div>Ingen endring</div>
            <div class="row-sub">Beholder eksisterende status</div>
          </div>
          <div class="num-radio"></div>
        </div>
        <div class="num-row" id="qr1" onclick="selectQueueOpt(1)">
          <span class="num-row-label">Logg på</span>
          <div class="num-radio"></div>
        </div>
        <div class="num-row" id="qr2" onclick="selectQueueOpt(2)">
          <span class="num-row-label">Logg av</span>
          <div class="num-radio"></div>
        </div>
        <div class="num-row" style="background:transparent !important;cursor:default;padding-top:10px;padding-bottom:10px;border-radius:0">
          <span class="num-row-label">SMS-varsling</span>
          <label class="toggle" onclick="event.stopPropagation()">
            <input type="checkbox" id="queueSmsToggle"/>
            <div class="toggle-track"></div>
          </label>
        </div>
      </div>
      <button class="sheet-btn" onclick="confirmQueueSheet()">Lagre</button>
    </div>
  </div>

</div>

<script>
  /* ─── Constants ─── */
  const DISPLAY_NUMBERS = [
    'Mitt nummer (999 99 999)',
    'Ekstern (888 88 888)',
    'Sentralbord (777 77 777)',
    'Skjult nummer'
  ];
  const IDX_STATUS   = ['ingen', 'pa', 'av'];
  const STATUS_LABEL = { ingen: 'Ingen endring', pa: 'Logg på', av: 'Logg av' };

  /* ─── State ─── */
  let selectedNumIdx  = 0;
  let numExternalOnly = false;
  let activeQueueIdx  = -1;

  let queues = [
    { name: 'Administrasjon (123 45 678)', status: 'av', sms: false },
    { name: 'Support (123 45 678)',        status: 'av', sms: false },
    { name: 'Verksted (123 45 678)',       status: 'av', sms: false }
  ];

  /* ─── Init ─── */
  (function init() {
    try {
      const saved = JSON.parse(localStorage.getItem('mbn_utenfor_arbeidstid'));
      if (saved) {
        if (saved.queues)          queues          = saved.queues;
        if (saved.displayNumIdx !== undefined) selectedNumIdx  = saved.displayNumIdx;
        if (saved.numExternalOnly !== undefined) numExternalOnly = saved.numExternalOnly;
      }
    } catch(e) {}
    document.getElementById('numLabel').textContent = DISPLAY_NUMBERS[selectedNumIdx];
    document.getElementById('numExternalStatus').style.display =
      (selectedNumIdx > 0 && numExternalOnly) ? '' : 'none';
    renderQueueCard();
  })();

  /* ─── Render queue card ─── */
  function renderQueueCard() {
    document.getElementById('queueCard').innerHTML = queues.map((q, i) => `
      <div class="row" onclick="openQueueSheet(${i})">
        <div class="row-body">
          <div class="row-label">${q.name.replace(/^(.+?)(\s+\(.+\))$/, '<strong>$1</strong>$2')}</div>
          <div class="row-sub">${STATUS_LABEL[q.status]}</div>
          ${q.sms ? '<div class="row-sub">SMS-varsling</div>' : ''}
        </div>
        <svg class="row-chevron" width="7" height="13" viewBox="0 0 7 13" fill="none">
          <path d="M1 1 6 6.5 1 12" stroke="#1020F9" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>`).join('');
  }

  /* ─── Visningsnummer sheet ─── */
  function openNumSheet() {
    selectedNumIdx = selectedNumIdx; // preserve
    renderNumOptions();
    const extCb = document.getElementById('numExternalCheck');
    extCb.checked  = selectedNumIdx > 0 ? numExternalOnly : false;
    extCb.disabled = selectedNumIdx === 0;
    document.getElementById('numSheetBackdrop').classList.add('open');
  }

  function renderNumOptions() {
    document.getElementById('numOptions').innerHTML = DISPLAY_NUMBERS.map((n, i) => `
      <div class="num-row${i === selectedNumIdx ? ' sel' : ''}" onclick="selectNum(${i})">
        <span class="num-row-label">${n}</span>
        <div class="num-radio"></div>
      </div>`).join('');
  }

  function selectNum(idx) {
    selectedNumIdx = idx;
    renderNumOptions();
    const extCb = document.getElementById('numExternalCheck');
    if (idx > 0) {
      numExternalOnly = true;
      extCb.checked   = true;
      extCb.disabled  = false;
    } else {
      numExternalOnly = false;
      extCb.checked   = false;
      extCb.disabled  = true;
    }
  }

  function confirmNum() {
    numExternalOnly = selectedNumIdx > 0
      ? document.getElementById('numExternalCheck').checked
      : false;
    document.getElementById('numLabel').textContent = DISPLAY_NUMBERS[selectedNumIdx];
    document.getElementById('numExternalStatus').style.display =
      (selectedNumIdx > 0 && numExternalOnly) ? '' : 'none';
    document.getElementById('numSheetBackdrop').classList.remove('open');
  }

  function onNumBackdrop(e) {
    if (e.target === document.getElementById('numSheetBackdrop'))
      document.getElementById('numSheetBackdrop').classList.remove('open');
  }

  /* ─── Køstatus sheet ─── */
  function openQueueSheet(idx) {
    activeQueueIdx = idx;
    const q = queues[idx];
    document.getElementById('queueSheetSub').textContent = q.name;
    const si = IDX_STATUS.indexOf(q.status);
    document.getElementById('queueSmsToggle').checked = q.sms;
    [0,1,2].forEach(i => {
      document.getElementById('qr' + i).className = 'num-row' + (i === si ? ' sel' : '');
    });
    document.getElementById('queueSheetBackdrop').classList.add('open');
  }

  function selectQueueOpt(idx) {
    [0,1,2].forEach(i => {
      document.getElementById('qr' + i).className = 'num-row' + (i === idx ? ' sel' : '');
    });
  }

  function confirmQueueSheet() {
    let si = 0;
    for (let i = 0; i < 3; i++) {
      if (document.getElementById('qr'+i).classList.contains('sel')) { si = i; break; }
    }
    queues[activeQueueIdx].status = IDX_STATUS[si];
    queues[activeQueueIdx].sms    = document.getElementById('queueSmsToggle').checked;
    renderQueueCard();
    document.getElementById('queueSheetBackdrop').classList.remove('open');
  }

  function closeQueueSheet() { document.getElementById('queueSheetBackdrop').classList.remove('open'); }
  function onQueueBackdrop(e) {
    if (e.target === document.getElementById('queueSheetBackdrop')) closeQueueSheet();
  }

  /* ─── Nav ─── */
  function cancel() { window.location.href = 'tidsstyring-detaljer.html'; }

  function save() {
    const data = { queues, displayNumIdx: selectedNumIdx, numExternalOnly };
    localStorage.setItem('mbn_utenfor_arbeidstid', JSON.stringify(data));
    window.location.href = 'tidsstyring-detaljer.html';
  }

  function switchTab(btn) {
    document.querySelectorAll('.tab').forEach(t => { t.classList.remove('active'); t.removeAttribute('aria-selected'); });
    btn.classList.add('active'); btn.setAttribute('aria-selected', 'true');
  }

  /* ─── Restore Jobbprofil badge ─── */
  (function() {
    try {
      const d = JSON.parse(localStorage.getItem('mbn_job_badge'));
      if (d && d.count > 0) {
        const b = document.getElementById('job-badge');
        if (b) { b.textContent = d.count; b.style.display = ''; }
      }
    } catch(e) {}
  })();
</script>
</body>
</html>
